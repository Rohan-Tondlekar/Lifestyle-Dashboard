services:
  - type: web
    name: lifestyle-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lifestyle-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PROGRAM_START_DATE
        value: "2026-06-02"

databases:
  - name: lifestyle-db
    plan: free